<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusPulse | Never Miss a Placement Again</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link

    <script id="tailwind-config">

                        "surface-container-low": "#f2f3ff",

                    "borderRadius": {
                        "xl": "1rem",
                        "2xl": "1.5rem",
                        "3xl": "2.5rem"
                    },
                    "spacing": {
                        "unit": "8px",
                        "stack-lg": "40px",
                        "container-max": "1280px"
                    }
                },
            }
        }
    </script>

  <body class="bg-surface text-on-background overflow-x-hidden selection:bg-primary/10 selection:text-primary bg-noise bg-blueprint-grid">
